<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login Register - UangMasuk</title><meta name="description" content="Aplikasi keuangan Gen Z retro neo brutalism."><link rel="stylesheet" href="../assets/css/genz-retro.css"></head><body><div class="auth-wrap"><div class="auth-card"><a class="brand" href="../"><span class="logo-bit">UM</span>UangMasuk</a><h1 class="page-title" style="margin-top:20px">Akses Akun</h1><p class="muted">Login, daftar, lupa password, dan OTP tetap ada dalam satu layar.</p><div class="tabs"><button class="tab active" data-auth-tab="login">Login</button><button class="tab" data-auth-tab="register">Register</button><button class="tab" data-auth-tab="forgot">Lupa Password</button><button class="tab" data-auth-tab="otp">OTP</button></div><div data-auth-panel="login"><div class="field"><label>Email</label><input class="input" placeholder="sae@email.com"></div><div class="field"><label>Password</label><input class="input" type="password" placeholder="••••••••"></div><button class="btn" data-demo-login>Masuk Demo</button></div><div class="hidden" data-auth-panel="register"><div class="field"><label>Nama</label><input class="input" placeholder="Nama kamu"></div><div class="field"><label>Email</label><input class="input"></div><button class="btn alt">Buat Akun</button></div><div class="hidden" data-auth-panel="forgot"><div class="field"><label>Email pemulihan</label><input class="input"></div><button class="btn pink">Kirim Link</button></div><div class="hidden" data-auth-panel="otp"><div class="field"><label>Kode OTP</label><input class="input" maxlength="6" placeholder="123456"></div><button class="btn">Verifikasi</button></div></div></div><script src="../assets/js/genz-finance.js"></script></body></html>
